name: ML Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      force_low_accuracy:
        description: 'Force low accuracy for testing failure scenario'
        required: false
        default: 'false'
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC Pull
        run: dvc pull || echo "DVC pull skipped - no remote configured"

      - name: Train model
        run: |
          if [ "${{ github.event.inputs.force_low_accuracy }}" = "true" ]; then
            python train.py --force-low-accuracy
          else
            python train.py --epochs 5
          fi

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-data
          path: mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: [validate]
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow data
        uses: actions/download-artifact@v4
        with:
          name: mlflow-data
          path: mlruns/

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"

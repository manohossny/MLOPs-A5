name: ML Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_low_accuracy:
        description: 'Force low accuracy for testing failure scenario'
        required: false
        default: false
        type: boolean

jobs:
  linter:
    runs-on: ubuntu-latest
    outputs:
      has_keyword: ${{ steps.keyword.outputs.has_keyword }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 syntax check
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check commit for [run-train] keyword
        id: keyword
        shell: bash
        run: |
          set -euo pipefail
          msg=$(git log -1 --pretty=%B)
          if printf '%s' "$msg" | grep -qF -- '[run-train]'; then
            echo "has_keyword=true" >> "$GITHUB_OUTPUT"
            echo "Authorization keyword found."
          else
            echo "has_keyword=false" >> "$GITHUB_OUTPUT"
            echo "Authorization keyword missing; train job will be skipped."
          fi

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.linter.outputs.has_keyword == 'true'
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'file:./mlruns' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC Pull
        run: dvc pull || echo "DVC pull skipped - no remote configured"

      - name: Train model
        shell: bash
        run: |
          set -o pipefail
          python train.py ${{ github.event.inputs.force_low_accuracy == 'true' && '--force-low-accuracy' || '--epochs 5' }} 2>&1 | tee error_logs.txt

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            accuracy.txt

      - name: Upload error logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt
          if-no-files-found: warn

      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"
